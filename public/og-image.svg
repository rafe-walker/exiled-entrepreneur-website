<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Exiled Entrepreneur — One Guy. Laid Off. Building an Empire.">
  <title>The Exiled Entrepreneur — One Guy. Laid Off. Building an Empire.</title>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1510;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5c472;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d4a853;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#d4a853;stop-opacity:0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Glow center effect -->
  <ellipse cx="600" cy="315" rx="500" ry="300" fill="url(#glowGrad)"/>

  <!-- Gold accent line top -->
  <rect x="60" y="60" width="120" height="4" fill="url(#goldGrad)" rx="2"/>

  <!-- Gold accent line bottom right -->
  <rect x="1020" y="566" width="120" height="4" fill="url(#goldGrad)" rx="2"/>

  <!-- Flame icon (simplified) -->
  <g transform="translate(60, 90)">
    <path d="M 24 44 C 24 44 8 36 8 22 C 8 14 14 8 20 6 C 18 10 20 14 24 16 C 22 12 26 8 30 6 C 28 12 32 16 36 20 C 38 16 36 10 32 6 C 40 10 44 18 44 26 C 44 36 36 44 28 46 C 26 44 24 44 24 44 Z" fill="#d4a853"/>
  </g>

  <!-- Brand name -->
  <text x="120" y="132" font-family="Georgia, serif" font-size="18" font-weight="700" fill="#d4a853" letter-spacing="6" text-transform="uppercase">THE EXILED ENTREPRENEUR</text>

  <!-- Main headline -->
  <text x="60" y="250" font-family="Georgia, serif" font-size="72" font-weight="900" fill="#f5f0e8" letter-spacing="-2">One Guy.</text>
  <text x="60" y="335" font-family="Georgia, serif" font-size="72" font-weight="900" fill="#f5f0e8" letter-spacing="-2">Laid Off.</text>
  <text x="60" y="420" font-family="Georgia, serif" font-size="72" font-weight="900" fill="url(#goldGrad)" letter-spacing="-2">Building an Empire.</text>

  <!-- Divider -->
  <rect x="60" y="450" width="600" height="2" fill="#d4a853" rx="1" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="60" y="490" font-family="Georgia, serif" font-size="22" fill="#a89a8a" font-weight="400">7 businesses · 9-agent AI system · Container house in the Arizona desert</text>

  <!-- URL -->
  <text x="60" y="560" font-family="Georgia, serif" font-size="18" fill="#d4a853" font-weight="600">theexiledentrepreneur.com</text>

  <!-- Stats right side -->
  <g transform="translate(900, 220)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="64" font-weight="900" fill="#d4a853" text-anchor="middle">7</text>
    <text x="0" y="28" font-family="Georgia, serif" font-size="14" fill="#a89a8a" text-anchor="middle" letter-spacing="3">BUSINESSES</text>

    <text x="0" y="110" font-family="Georgia, serif" font-size="64" font-weight="900" fill="#d4a853" text-anchor="middle">9</text>
    <text x="0" y="138" font-family="Georgia, serif" font-size="14" fill="#a89a8a" text-anchor="middle" letter-spacing="3">AI AGENTS</text>

    <text x="0" y="220" font-family="Georgia, serif" font-size="64" font-weight="900" fill="#d4a853" text-anchor="middle">0</text>
    <text x="0" y="248" font-family="Georgia, serif" font-size="14" fill="#a89a8a" text-anchor="middle" letter-spacing="3">REGRETS</text>
  </g>

  <!-- Border frame -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#d4a853" stroke-width="1.5" stroke-opacity="0.25" rx="4"/>
</svg>
